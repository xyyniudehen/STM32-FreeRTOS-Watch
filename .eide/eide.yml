miscInfo:
  uid: c172d4ea53c301417222320f90e75c34
targets:
  Target 1:
    cppPreprocessAttrs:
      defineList:
        - USE_STDPERIPH_DRIVER
        - STM32F10X_MD
      incList:
        - .
        - start
        - user
        - Library
        - System
        - hardware
        - FREERTOS/FreeRTOS-Kernel/include
        - FREERTOS/FreeRTOS-Kernel/portable/RVDS/ARM_CM3
        - .cmsis/include
        - RTE/_Target 1
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 4
          afterBuildTasks:
            - name: "[Copy linker output for Keil User Commands]"
              abortAfterFailed: true
              command: mkdir ${KEIL_OUTPUT_DIR} & copy "${OutDir}\${ProjectName}.axf" "${KEIL_OUTPUT_DIR}\${ProjectName}.axf"
              disable: false
            - name: fromelf --bin --output .\Objects\APP.bin .\Objects\project.axf
              abortAfterFailed: true
              command: fromelf --bin --output .\Objects\APP.bin .\Objects\project.axf
              disable: false
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            gnu-extensions: true
            one-elf-section-per-function: true
            optimization: level-0
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: false
          linker:
            $disableOutputTask: false
            $outputTaskExcludes:
              - .bin
              - .s19
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x5000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0xc000"
                startAddr: "0x8004000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: false
